services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_MODE: http
    container_name: frontend
    ports:
      - "80:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NORNIKEL_ROOT: /data/docs
      SIDECAR_URL: http://sidecar:8765
      SIDECAR_TIMEOUT_MS: "120000"
      BIND_ADDR: 0.0.0.0:8080
    ports:
      - "8080:8080"
    volumes:
      - ./docs:/data/docs:ro
    depends_on:
      - sidecar

  sidecar:
    build:
      context: ./agent-system
      dockerfile: Dockerfile
    # Режим целиком задаёт agent-system/.env (см. .env.example): без него —
    # дефолты settings.py (mock-извлечение, LLM выключен) и стек обязан
    # подниматься на чистой машине без ключей (обещание README).
    # ВАЖНО: блок environment: перекрывал бы env_file — не возвращать его сюда.
    env_file:
      - path: ./agent-system/.env
        required: false
    ports:
      - "8766:8765"
    volumes:
      - ./docs:/app/docs:ro
      - ./norn-hack:/app/norn-hack:ro
    depends_on:
      - postgres

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nornikel
      POSTGRES_USER: nornikel
      POSTGRES_PASSWORD: nornikel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nornikel -d nornikel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
