services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_MODE: http
    container_name: frontend
    ports:
      - "80:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NORNIKEL_ROOT: /data/docs
      SIDECAR_URL: http://sidecar:8765
      SIDECAR_TIMEOUT_MS: "120000"
      BIND_ADDR: 0.0.0.0:8080
    ports:
      - "8080:8080"
    volumes:
      - ./docs:/data/docs:ro
    depends_on:
      - sidecar

  sidecar:
    build:
      context: ./agent-system
      dockerfile: Dockerfile
    env_file:
      - path: ./agent-system/.env
        required: false
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_MODEL_EXTRACT: ${OPENAI_MODEL_EXTRACT:-gpt-5.5}
      OPENAI_MODEL_FAST: ${OPENAI_MODEL_FAST:-gpt-5.5}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      SIDECAR_LLM_ENABLED: ${SIDECAR_LLM_ENABLED:-true}
    ports:
      - "8766:8765"
    volumes:
      - ./docs:/app/docs:ro
      - ./norn-hack:/app/norn-hack:ro

  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["rag"]
    environment:
      POSTGRES_DB: nornikel
      POSTGRES_USER: nornikel
      POSTGRES_PASSWORD: nornikel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nornikel -d nornikel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
