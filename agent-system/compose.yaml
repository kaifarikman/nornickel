services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nornikel
      POSTGRES_USER: nornikel
      POSTGRES_PASSWORD: nornikel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nornikel -d nornikel"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent-system:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://nornikel:nornikel@postgres:5432/nornikel
    ports:
      - "8765:8765"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app/agent-system
      # Данные кейса и pack/fixtures: REPO_ROOT внутри контейнера = /app,
      # /diagnose читает norn-hack/…, service — docs/packs/*.yaml
      - ../norn-hack:/app/norn-hack:ro
      - ../docs:/app/docs:ro

volumes:
  postgres-data:
